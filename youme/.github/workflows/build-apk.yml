name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: youme
        run: flutter pub get

      - name: Analyze code
        working-directory: youme
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        working-directory: youme
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: youme-debug-${{ github.sha }}
          path: youme/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        working-directory: youme
        run: flutter build apk --release --no-tree-shake-icons
        continue-on-error: true

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: youme-release-${{ github.sha }}
          path: youme/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        if: success()

      - name: Comment PR with download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ APK disponible\n\nLe build s'est terminé avec succès.\n\n📦 **Télécharger l'APK** → [Voir les artefacts](${runUrl})\n\n> L'APK debug est disponible pendant 30 jours.`
            });
