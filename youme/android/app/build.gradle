plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader -> keystoreProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

// ── Keystore validation : fallback to debug signing if credentials are wrong ──
def isKeystoreValid = false
if (keystorePropertiesFile.exists()) {
    try {
        def ksFile = file(keystoreProperties["storeFile"] ?: "release.keystore")
        if (ksFile.exists()) {
            def ks = java.security.KeyStore.getInstance("PKCS12")
            try {
                def fis = new java.io.FileInputStream(ksFile)
                ks.load(fis, (keystoreProperties["storePassword"] ?: "").toCharArray())
                fis.close()
                isKeystoreValid = true
            } catch (Exception ignored) {
                // Try JKS format as fallback
                ks = java.security.KeyStore.getInstance("JKS")
                def fis = new java.io.FileInputStream(ksFile)
                ks.load(fis, (keystoreProperties["storePassword"] ?: "").toCharArray())
                fis.close()
                isKeystoreValid = true
            }
        }
    } catch (Exception e) {
        println "⚠️  Keystore validation failed (${e.class.simpleName}: ${e.message}) — falling back to debug signing"
    }
}

android {
    namespace "com.youme.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.youme.app"
        minSdkVersion 21
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        manifestPlaceholders["MAPS_API_KEY"] = System.getenv("GOOGLE_MAPS_KEY") ?: ""
    }

    signingConfigs {
        release {
            if (isKeystoreValid) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(keystoreProperties["storeFile"] ?: "release.keystore")
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            signingConfig isKeystoreValid ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            debuggable false
            jniDebuggable false
            renderscriptDebuggable false
            pseudoLocalesEnabled false
            crunchPngs true
        }
        debug {
            debuggable true
            minifyEnabled false
            shrinkResources false
        }
        profile {
            initWith release
            debuggable false
            minifyEnabled true
            signingConfig signingConfigs.debug
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    lint {
        disable "InvalidPackage"
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.3.0"
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
}

