name: youme
description: Application de messagerie pour couples avec analyse IA comportementale.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Google Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Navigation
  go_router: ^14.3.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Crypto / E2EE
  pointycastle: ^3.9.1
  encrypt: ^5.0.3
  convert: ^3.1.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_sound: ^9.2.13
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1

  # UI / Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  animations: ^2.0.11

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.1.1
  path_provider: ^2.1.4
  share_plus: ^10.0.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  crypto: ^3.0.5
  logger: ^2.4.0
  collection: ^1.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
