# ═══════════════════════════════════════════════════════════════════════════
# YouMe — Workflow GitHub Actions sécurisé
#
# Ce workflow :
#   ✅ Build en mode RELEASE uniquement (pas de debug APK publié)
#   ✅ Obfuscation Dart (--obfuscate)
#   ✅ Split debug info (symboles séparés, jamais dans l'APK)
#   ✅ R8 activé (via build.gradle : minifyEnabled true)
#   ✅ Resource shrinking activé
#   ✅ Analyse statique du code (flutter analyze)
#   ✅ Détection de secrets hardcodés (grep sur le code)
#   ✅ Arrêt automatique si une erreur de sécurité est détectée
#   ✅ Clés/URL sensibles injectées via GitHub Secrets (jamais dans le code)
#   ✅ Artefacts APK et split-debug-info conservés séparément
#
# Secrets GitHub requis (Settings → Secrets and variables → Actions) :
#   SUPABASE_URL         — URL du projet Supabase
#   SUPABASE_ANON_KEY    — Clé anonyme Supabase
#   GOOGLE_MAPS_KEY      — Clé API Google Maps
#   KEYSTORE_BASE64      — Keystore de release encodé en base64
#   KEY_ALIAS            — Alias de la clé dans le keystore
#   KEY_PASSWORD         — Mot de passe de la clé
#   STORE_PASSWORD       — Mot de passe du keystore
# ═══════════════════════════════════════════════════════════════════════════

name: "YouMe — Secure Release Build"

on:
  push:
    branches: [ main, master, release/*, hotfix/* ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_aab:
        description: "Générer un App Bundle (AAB) en plus de l'APK ?"
        type: boolean
        default: false

# Empêcher les builds concurrents sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # JOB 1 — Vérification de sécurité du code source
  # ═══════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔍 Analyse de sécurité"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youme

    steps:
      # ── Récupération du code ──────────────────────────────────────────
      - name: "📥 Checkout du dépôt"
        uses: actions/checkout@v4

      # ── Détection de secrets hardcodés ───────────────────────────────
      - name: "🔑 Vérifier l'absence de secrets hardcodés"
        run: |
          echo "=== Recherche de secrets potentiellement hardcodés ==="

          FAIL=0

          # Détecter les clés API Supabase (format JWT)
          if grep -rn "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" lib/ --include="*.dart" 2>/dev/null; then
            echo "❌ ERREUR: Clé JWT Supabase détectée dans le code source!"
            FAIL=1
          fi

          # Détecter des clés Google API hardcodées
          if grep -rn "AIzaSy" lib/ --include="*.dart" 2>/dev/null; then
            echo "❌ ERREUR: Clé Google API détectée dans le code source!"
            FAIL=1
          fi

          # Détecter des tokens Firebase
          if grep -rn "AAAA[A-Za-z0-9_-]" lib/ --include="*.dart" 2>/dev/null; then
            echo "❌ ERREUR: Token Firebase potentiellement hardcodé!"
            FAIL=1
          fi

          # Détecter des mots de passe/secrets en clair
          if grep -rEn "(password|secret|api_key|apikey)\s*=\s*['\"][^'\"]{8,}" lib/ \
               --include="*.dart" 2>/dev/null | grep -v "// " | grep -v "fromEnvironment"; then
            echo "❌ ERREUR: Secret potentiellement hardcodé détecté!"
            FAIL=1
          fi

          # Détecter des URLs HTTP non sécurisées (hors localhost)
          if grep -rn "http://" lib/ --include="*.dart" 2>/dev/null \
               | grep -v "localhost" | grep -v "127.0.0.1" | grep -v "// " | grep -v "example"; then
            echo "⚠️  AVERTISSEMENT: URL HTTP non sécurisée détectée!"
          fi

          # Vérifier que les clés utilisent bien String.fromEnvironment
          if grep -n "supabaseUrl\s*=\s*['\"]https://" lib/core/constants/app_constants.dart 2>/dev/null \
               | grep -v "fromEnvironment"; then
            echo "❌ ERREUR: URL Supabase hardcodée dans app_constants.dart!"
            FAIL=1
          fi

          if [ "$FAIL" -eq "1" ]; then
            echo ""
            echo "❌ ÉCHEC de la vérification de sécurité. Corrigez les problèmes ci-dessus avant de merger."
            exit 1
          fi

          echo "✅ Aucun secret hardcodé détecté."

      # ── Vérifier l'absence du fichier key.properties ──────────────────
      - name: "🔐 Vérifier que key.properties n'est pas commité"
        run: |
          if [ -f "android/key.properties" ]; then
            echo "❌ ERREUR: android/key.properties est présent dans le dépôt!"
            echo "   Ce fichier contient les mots de passe du keystore."
            echo "   Ajoutez-le à .gitignore immédiatement!"
            exit 1
          fi
          echo "✅ android/key.properties absent du dépôt (correct)."

      # ── Vérifier que le keystore n'est pas commité ────────────────────
      - name: "🔐 Vérifier l'absence de fichiers keystore"
        run: |
          if find . -name "*.jks" -o -name "*.keystore" 2>/dev/null | grep -v ".git"; then
            echo "❌ ERREUR: Fichier keystore (.jks/.keystore) détecté dans le dépôt!"
            echo "   Ne jamais commiter un keystore — il contient votre clé de signature."
            exit 1
          fi
          echo "✅ Aucun keystore dans le dépôt (correct)."

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 2 — Analyse statique Flutter
  # ═══════════════════════════════════════════════════════════════════════
  analyze:
    name: "📊 Analyse statique Dart"
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: youme

    steps:
      - name: "📥 Checkout du dépôt"
        uses: actions/checkout@v4

      - name: "☕ Installation de Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: "🐦 Installation de Flutter (dernière version stable)"
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: "📦 Installation des dépendances"
        run: flutter pub get

      - name: "🔍 Analyse statique du code Dart"
        run: flutter analyze --fatal-infos
        # En production, --fatal-infos bloque le build si des warnings sont trouvés

      - name: "🧪 Exécution des tests (si présents)"
        run: |
          if [ -d "test" ] && [ "$(ls -A test)" ]; then
            flutter test --coverage
          else
            echo "ℹ️  Aucun test trouvé — ignoré."
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 3 — Build Release sécurisé (APK)
  # ═══════════════════════════════════════════════════════════════════════
  build-apk:
    name: "🏗️ Build APK Release"
    runs-on: ubuntu-latest
    needs: [ security-scan, analyze ]
    defaults:
      run:
        working-directory: youme
    outputs:
      apk-path: ${{ steps.build-apk.outputs.apk-path }}

    steps:
      - name: "📥 Checkout du dépôt"
        uses: actions/checkout@v4

      - name: "☕ Installation de Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: "🐦 Installation de Flutter (dernière version stable)"
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Restauration du keystore depuis les secrets ───────────────────
      - name: "🔑 Restauration du keystore de release"
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          echo "✅ Keystore restauré."

      # ── Création du fichier key.properties ───────────────────────────
      - name: "🔑 Création de key.properties"
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "✅ key.properties créé."

      - name: "📦 Installation des dépendances Flutter"
        run: flutter pub get

      # ── Build APK Release avec obfuscation ───────────────────────────
      - name: "🏗️ Build APK Release (obfusqué)"
        id: build-apk
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=GOOGLE_MAPS_KEY="$GOOGLE_MAPS_KEY"

          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          echo "apk-path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "✅ APK Release généré : $APK_PATH"
          ls -lh "$APK_PATH"

      # ── Nettoyage sécurisé du keystore (ne pas conserver en CI) ──────
      - name: "🧹 Nettoyage du keystore temporaire"
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/key.properties
          echo "✅ Fichiers sensibles supprimés."

      # ── Upload de l'APK ───────────────────────────────────────────────
      - name: "📤 Upload APK Release"
        uses: actions/upload-artifact@v4
        with:
          name: youme-release-apk-${{ github.sha }}
          path: youme/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
          if-no-files-found: error

      # ── Upload des symboles de debug (séparés de l'APK) ──────────────
      - name: "📤 Upload split-debug-info (symboles privés)"
        uses: actions/upload-artifact@v4
        with:
          name: youme-debug-info-${{ github.sha }}
          path: youme/build/debug-info/
          retention-days: 90
          # Ces fichiers permettent de désober les crash reports — à conserver privés
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 4 — Build App Bundle (AAB) optionnel
  # ═══════════════════════════════════════════════════════════════════════
  build-aab:
    name: "🏗️ Build App Bundle Release"
    runs-on: ubuntu-latest
    needs: [ security-scan, analyze ]
    if: github.event.inputs.build_aab == 'true' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: youme

    steps:
      - name: "📥 Checkout du dépôt"
        uses: actions/checkout@v4

      - name: "☕ Installation de Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: "🐦 Installation de Flutter (dernière version stable)"
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: "🔑 Restauration du keystore de release"
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: "🔑 Création de key.properties"
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: "📦 Installation des dépendances Flutter"
        run: flutter pub get

      # ── Build App Bundle avec obfuscation ────────────────────────────
      - name: "🏗️ Build AAB Release (obfusqué)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info-aab \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=GOOGLE_MAPS_KEY="$GOOGLE_MAPS_KEY"

          echo "✅ App Bundle généré."
          ls -lh build/app/outputs/bundle/release/app-release.aab

      - name: "🧹 Nettoyage du keystore temporaire"
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/key.properties

      - name: "📤 Upload App Bundle"
        uses: actions/upload-artifact@v4
        with:
          name: youme-release-aab-${{ github.sha }}
          path: youme/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: "📤 Upload split-debug-info AAB"
        uses: actions/upload-artifact@v4
        with:
          name: youme-debug-info-aab-${{ github.sha }}
          path: youme/build/debug-info-aab/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════
  # JOB 5 — Rapport de sécurité et commentaire PR
  # ═══════════════════════════════════════════════════════════════════════
  security-report:
    name: "📋 Rapport de sécurité"
    runs-on: ubuntu-latest
    needs: [ build-apk ]
    if: always()

    steps:
      - name: "📊 Générer le rapport de sécurité"
        run: |
          echo "## 🔒 Rapport de sécurité YouMe" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Vérification | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets hardcodés | ✅ Aucun détecté |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Release | ✅ Activé |" >> $GITHUB_STEP_SUMMARY
          echo "| Obfuscation Dart | ✅ --obfuscate |" >> $GITHUB_STEP_SUMMARY
          echo "| Split debug info | ✅ Séparé de l'APK |" >> $GITHUB_STEP_SUMMARY
          echo "| R8 / ProGuard | ✅ minifyEnabled true |" >> $GITHUB_STEP_SUMMARY
          echo "| Resource shrinking | ✅ shrinkResources true |" >> $GITHUB_STEP_SUMMARY
          echo "| Variables injectées | ✅ GitHub Secrets → --dart-define |" >> $GITHUB_STEP_SUMMARY
          echo "| Keystore temporaire | ✅ Supprimé après build |" >> $GITHUB_STEP_SUMMARY

      # ── Commentaire automatique sur les PRs ──────────────────────────
      - name: "💬 Commentaire PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🔒 Build sécurisé YouMe — ' + sha,
                '',
                '### ✅ Vérifications de sécurité réussies',
                '- 🔑 Aucun secret hardcodé détecté',
                '- 🏗️ APK compilé en mode **Release**',
                '- 🔀 Obfuscation Dart activée (`--obfuscate`)',
                '- 📦 Split debug info séparé (jamais dans l\'APK)',
                '- 🛡️ R8 + ProGuard + resource shrinking activés',
                '- 🔒 Variables sensibles injectées via GitHub Secrets',
                '',
                `📦 **[Télécharger l\'APK Release](${runUrl})**`,
                '',
                '> ⚠️ Le split-debug-info est conservé séparément pendant 90 jours pour le désobfuscation des crash reports.'
              ].join('\n')
            });
