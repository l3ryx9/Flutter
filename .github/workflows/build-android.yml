name: Build Android APK

# Build 100% local (GitHub Actions + Gradle), sans passer par le service
# cloud EAS Build — utile pour éviter les files d'attente / quotas EAS et
# garder un contrôle total sur l'environnement de build.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type de build"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      HAS_KEYSTORE_SECRET: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout du code
        uses: actions/checkout@v4

      # ── 2. Node.js (aligné sur eas.json : 22.x) ──────────────────────────
      - name: Configuration Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── 3. Dépendances npm ────────────────────────────────────────────────
      - name: Installation des dépendances
        run: npm install --legacy-peer-deps
        env:
          npm_config_fund: false
          npm_config_audit: false

      # ── 4. JDK 17 (requis par Gradle / Android) ──────────────────────────
      - name: Configuration JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Cache Gradle (accélère les builds suivants) ───────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Génération du projet natif Android ────────────────────────────
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          CI: true

      # ── 7a. Génération automatique d'un keystore (si aucun secret fourni) ─
      #
      # Ceci ne s'exécute qu'UNE SEULE FOIS : dès que tu auras copié le
      # résultat (voir artifact "keystore-a-sauvegarder-une-seule-fois")
      # dans les secrets GitHub, cette étape sera sautée à chaque build
      # suivant et le keystore que tu auras enregistré sera réutilisé.
      - name: Génération auto du keystore (première fois uniquement)
        if: ${{ env.HAS_KEYSTORE_SECRET != 'true' }}
        run: |
          echo "⚠️  Aucun keystore trouvé dans les secrets — génération automatique."
          keytool -genkeypair -v -storetype JKS \
            -keystore android/app/release.keystore \
            -alias youme-release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=YouMe, OU=YouMe, O=YouMe, L=Paris, S=IDF, C=FR" \
            -storepass "ChangeMoiVite123!" \
            -keypass "ChangeMoiVite123!"

          base64 -w0 android/app/release.keystore > keystore-base64.txt

          mkdir -p keystore-output
          cp keystore-base64.txt keystore-output/ANDROID_KEYSTORE_BASE64.txt
          echo "ChangeMoiVite123!" > keystore-output/ANDROID_STORE_PASSWORD.txt
          echo "youme-release" > keystore-output/ANDROID_KEY_ALIAS.txt
          echo "ChangeMoiVite123!" > keystore-output/ANDROID_KEY_PASSWORD.txt

          echo "✅ Keystore généré. Il sera disponible en artifact à télécharger."
          echo "⚠️  IMPORTANT : après l'avoir récupéré, change le mot de passe"
          echo "   par défaut avant de le mettre en production si tu veux plus de sécurité."

      # ── 7b. Upload du keystore généré (à récupérer UNE SEULE FOIS) ────────
      - name: Upload du keystore (à sauvegarder dans les secrets)
        if: ${{ env.HAS_KEYSTORE_SECRET != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: keystore-a-sauvegarder-une-seule-fois
          path: keystore-output/
          retention-days: 7

      # ── 7c. Décodage du keystore de signature (si secret déjà fourni) ────
      - name: Décodage du keystore release
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "✅ Keystore release décodé depuis les secrets"
          elif [ -f android/app/release.keystore ]; then
            echo "✅ Keystore généré automatiquement à l'étape précédente, réutilisé pour ce build"
          else
            echo "⚠️  Aucun keystore disponible — l'APK sera signé en debug"
          fi

      # ── 8. Câblage réel de la signature release dans build.gradle ───────
      - name: Configuration de la signature release
        run: node ci/sign-android.js

      # ── 9. Licences Android SDK (SDK pré-installé sur le runner) ─────────
      - name: Acceptation des licences SDK
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # ── 10. Build Gradle ──────────────────────────────────────────────────
      - name: Build de l'APK
        run: |
          cd android
          chmod +x gradlew
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      # ── 11. Upload de l'APK généré ────────────────────────────────────────
      - name: Upload de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: gitcrush-${{ env.BUILD_TYPE }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
